<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Fullstack Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>Name them All!</h1>
        
        <div class="stats">
            <div class="timer">Time: <span id="time">00:00</span></div>
            <div class="score">Caught: <span id="count">0</span> / 151</div>
        </div>

        <div class="controls">
            <input type="text" id="guess-input" placeholder="Press Start Game!" disabled>
            <button id="start-btn">Start Game</button>
            <button id="highscore-btn">Show Leaderboard</button>
        </div>

        <div id="pokemon-grid" class="grid">
            <!-- Pokemon slots generated here -->
        </div>

        <div id="leaderboard" class="leaderboard hidden" aria-hidden="true">
            <div class="leaderboard-panel">
                <button id="close-leaderboard" class="close">✕</button>
                <h2>Leaderboard</h2>
                <ol id="leaderboard-list" class="leaderboard-list"></ol>
            </div>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
